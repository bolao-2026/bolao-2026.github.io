<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bolão 2026</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 600px;
      animation: fadeIn 1s ease-in;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      color: #9ca3af;
    }

    .highlight {
      margin-top: 20px;
      font-size: 1.1rem;
      color: #22c55e;
    }

    .flags {
      margin-top: 20px;
      font-size: 1.8rem;
      letter-spacing: 8px;
      opacity: 0.8;
    }

    /* Contador central */
    .countdown-box {
      margin: 25px 0;
      padding: 20px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .countdown-title {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .countdown {
      font-size: 2.5rem;
      font-weight: bold;
      color: #22c55e;
      letter-spacing: 1px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Bolão 2026</h1>


    <div class="countdown-box">
      <div class="countdown-title">Copa começa em</div>
      <div class="countdown" id="countdown"></div>
    </div>

    <div class="flags">
      🇧🇷 🇦🇷 🇫🇷 🇩🇪 🇪🇸 🇵🇹 🇺🇸 🇲🇽
    </div>

    <p class="highlight">
      Fique ligado.
    </p>
  </div>

  <script>
    const countdownElement = document.getElementById("countdown");

    const targetDate = new Date("2026-06-11T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        countdownElement.innerHTML = "A Copa começou!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdownElement.innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
