<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bolão 2026</title>

  <!-- Fonte estilo DS-Digital -->
  <style>
    @font-face {
      font-family: 'DS-Digital';
      src: url('https://cdn.jsdelivr.net/gh/keshikan/DSEG/fonts/DSEG7Classic-Regular.woff2') format('woff2');
      font-weight: normal;
      font-style: normal;
    }
  </style>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      display: grid;
      place-items: center;
      min-height: 100vh;
      text-align: center;
      padding: 20px;
    }

    .container {
      max-width: 600px;
      width: 100%;
      animation: fadeIn 1s ease-in;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }

    p {
      font-size: 1.2rem;
      color: #9ca3af;
    }

    .highlight {
      margin-top: 20px;
      font-size: 1.1rem;
      color: #22c55e;
    }

    .flags {
      margin-top: 20px;
      font-size: 1.8rem;
      letter-spacing: 8px;
      opacity: 0.8;
    }

    /* Contador */
    .countdown-box {
      margin: 25px 0;
      padding: 20px;
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }

    .countdown-title {
      font-size: 1rem;
      color: #9ca3af;
      margin-bottom: 10px;
    }

    .countdown {
      font-family: 'DS-Digital', monospace;
      font-size: 2.8rem;
      color: #22c55e;
      letter-spacing: 3px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 8px #22c55e, 0 0 16px #22c55e;
    }

    .rules-link {
      display: block;
      margin-top: 8px;
      font-size: 0.9rem;
      color: #9ca3af;
      text-decoration: none;
      transition: color 0.3s;
    }

    .rules-link:hover {
      color: #22c55e;
    }

    /* MOBILE */
    @media (max-width: 600px) {
      body {
        place-items: start center;
        padding-top: 40px;
      }

      h1 {
        font-size: 2rem;
      }

      p {
        font-size: 1rem;
      }

      .countdown-box {
        padding: 15px;
      }

      .countdown {
        font-size: 2rem;
      }

      .flags {
        font-size: 1.4rem;
        letter-spacing: 4px;
      }

      .highlight {
        font-size: 1rem;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>Bolão Copa 2026</h1>

    <div class="countdown-box">
      <div class="countdown" id="countdown"></div>
    </div>

    <div class="flags">
      🇧🇷 🇦🇷 🇫🇷 🇩🇪 🇪🇸 🇵🇹 🇺🇸 🇲🇽
    </div>

    <p class="highlight">
      Fique ligado.
    </p>

    <a href="https://drive.google.com/file/d/1j5u1Xq34p4i9gaKjPqjln2Lim9nAmn6M/view" class="rules-link" target="_blank">Regras</a>
  </div>

  <script>
    const countdownElement = document.getElementById("countdown");
    const targetDate = new Date("2026-06-11T00:00:00").getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const diff = targetDate - now;

      if (diff <= 0) {
        countdownElement.innerHTML = "A Copa começou!";
        return;
      }

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
      const minutes = Math.floor((diff / (1000 * 60)) % 60);
      const seconds = Math.floor((diff / 1000) % 60);

      countdownElement.innerHTML =
        `${days}d ${hours}h ${minutes}m ${seconds}s`;
    }

    setInterval(updateCountdown, 1000);
    updateCountdown();
  </script>
</body>
</html>
